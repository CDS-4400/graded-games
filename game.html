<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graded Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ==============================
       DETAIL PAGE
       This single file is reused for
       every game. The JavaScript reads
       the ?id= in the URL and loads
       the right game's data.
       
       Example URL: game.html?id=elden-ring
  ============================== -->
  <main style="padding-top: 40px;">
    <div id="game-detail">
      <!-- Content is injected here by buildDetailPage() in script.js -->
      <p style="color: #888;">Loading...</p>
    </div>
  </main>

  <script src="script.js"></script>

</body>
</html>
