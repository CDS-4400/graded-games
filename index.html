<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graded Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ==============================
       HEADER
       The site title and subtitle.
       Edit the text directly here.
  ============================== -->
  <header>
    <h1>🎮 Graded Games</h1>
    <p>Honest game reviews, graded like a report card.</p>
  </header>

  <!-- ==============================
       MAIN CONTENT
       The card grid is built here
       automatically by script.js.
       You don't need to edit this section
       — just add games to script.js.
  ============================== -->
  <main>
    <div id="game-grid">
      <!-- Cards are injected here by JavaScript -->
    </div>
  </main>

  <!-- Load our JavaScript file last so the HTML is ready when it runs -->
  <script src="script.js"></script>

</body>
</html>
